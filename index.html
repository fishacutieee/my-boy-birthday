<!DOCTYPE html>
<html>
<head>
<title>Birthday 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ffdde1, #ee9ca7);
}

/* CARD */
.container {
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
    width: 300px;
}

/* TITLE */
h1 {
    color: white;
    font-weight: 500;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    border-radius: 15px;
    border: none;
    outline: none;
    margin-top: 15px;
    text-align: center;
}

/* BUTTON */
button {
    margin-top: 20px;
    padding: 12px;
    width: 100%;
    border: none;
    border-radius: 15px;
    background: #ff4d6d;
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    background: #ff1e4d;
}

</style>
</head>

<body>

<div class="container">
    <h1>Enter Password 💖</h1>
    <input type="password" id="password" placeholder="Type here...">
    <button onclick="checkPassword()">Unlock</button>
</div>

<script>
function checkPassword() {
    let pass = document.getElementById("password").value;

    if(pass === "1234") {
        alert("Welcome baby 💖");
    } else {
        alert("Wrong password 😭");
    }
}
</script>

</body>
</html>
