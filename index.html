<!DOCTYPE html>
<html>
<head>
<title>Birthday 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #3b0a0a, #800020);
    overflow: hidden;
}

/* FLOATING GLOW DECOR */
.glow {
    position: absolute;
    width: 200px;
    height: 200px;
    background: rgba(255, 100, 120, 0.3);
    border-radius: 50%;
    filter: blur(80px);
}

.glow1 { top: 10%; left: 20%; }
.glow2 { bottom: 10%; right: 20%; }

/* CARD */
.container {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 25px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    text-align: center;
    width: 300px;
    z-index: 2;
}

/* TITLE */
h1 {
    color: white;
    font-weight: 500;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    border-radius: 15px;
    border: none;
    outline: none;
    margin-top: 15px;
    text-align: center;
    background: rgba(255,255,255,0.2);
    color: white;
}

/* BUTTON */
button {
    margin-top: 20px;
    padding: 12px;
    width: 100%;
    border: none;
    border-radius: 15px;
    background: #ff4d6d;
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    background: #ff1e4d;
}

/* HINT */
.hint {
    margin-top: 15px;
    font-size: 13px;
    color: #ffd6dc;
    opacity: 0.8;
}

</style>
</head>

<body>

<div class="glow glow1"></div>
<div class="glow glow2"></div>

<div class="container">
    <h1>Enter Password 💖</h1>
    <input type="password" id="password" placeholder="Type here... (DDMM)">
    <button onclick="checkPassword()">Unlock</button>

    <div class="hint">
        hint: it's your birthday 🎂
    </div>
</div>

<script>
function checkPassword() {
    let pass = document.getElementById("password").value;

    if(pass === "1204") {
        alert("Welcome baby 💖");
    } else {
        alert("Wrong password 😭");
    }
}
</script>

</body>
</html>
