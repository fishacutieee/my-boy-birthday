<!DOCTYPE html>
<html>
<head>
<title>For You 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #3b0a0a, #800020);
    overflow-x: hidden;
    color: white;
}

/* PAGE SYSTEM */
.page { display: none; }

/* GLOW */
.glow {
    position: fixed;
    width: 200px;
    height: 200px;
    background: rgba(255, 80, 100, 0.3);
    border-radius: 50%;
    filter: blur(90px);
}
.g1 { top: 10%; left: 10%; }
.g2 { bottom: 10%; right: 10%; }

/* CARD */
.card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    padding: 30px;
    border-radius: 25px;
    width: 320px;
    margin: 80px auto;
    text-align: center;
}

/* BUTTON */
.btn {
    background: linear-gradient(145deg, #8b0000, #ff1e4d);
    padding: 12px;
    border-radius: 15px;
    border: none;
    color: white;
    cursor: pointer;
    margin-top: 10px;
}
.btn:hover { transform: scale(1.05); }

/* GRID */
.menu {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.card-btn {
    background: linear-gradient(145deg, #8b0000, #ff1e4d);
    border-radius: 20px;
    padding: 20px;
    cursor: pointer;
}
.card-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 20px #ff4d6d;
}

/* IMAGE */
.img-box {
    border-radius: 20px;
    padding: 5px;
    margin: 10px;
    background: white;
}
.img-box img {
    width: 100%;
    border-radius: 15px;
}

/* TICKET */
.ticket {
    border: 2px dashed white;
    padding: 15px;
    margin: 10px;
    border-radius: 15px;
    cursor: pointer;
}
.ticket:hover {
    background: rgba(255,255,255,0.2);
}

/* LETTER */
.letter {
    background: white;
    color: black;
    padding: 20px;
    border-radius: 20px;
}
</style>
</head>

<body>

<div class="glow g1"></div>
<div class="glow g2"></div>

<!-- PASSWORD -->
<div id="login" class="card">
    <h2>Enter Password 💖</h2>
    <input type="password" id="password" placeholder="Type here..." style="width:100%;padding:10px;border-radius:10px;border:none;">
    <button class="btn" onclick="checkPassword()">Unlock</button>
    <p style="font-size:12px;">hint: it's your birthday 🎂</p>
</div>

<!-- HOME -->
<div id="home" class="page">
<div class="card">
<h2>Special For You 💖</h2>

<div class="menu">
<div class="card-btn" onclick="go('gallery')">🕷️ Gallery</div>
<div class="card-btn" onclick="go('song')">🎵 Song</div>
<div class="card-btn" onclick="go('gift')">🎁 Gift</div>
<div class="card-btn" onclick="go('secret')">💌 Secret</div>
</div>

</div>
</div>

<!-- GALLERY -->
<div id="gallery" class="page">
<div class="card">
<h2>Happy 21st Birthday 🎂</h2>

<div class="img-box"><img src="img1.jpg"></div>
<div class="img-box"><img src="img2.jpg"></div>
<div class="img-box"><img src="img3.jpg"></div>

<button class="btn" onclick="go('home')">Back</button>
</div>
</div>

<!-- SONG -->
<div id="song" class="page">
<div class="card">
<h2>This is for you 🎵</h2>

<iframe width="100%" height="200"
src="https://www.youtube.com/embed/VIDEO_ID">
</iframe>

<button class="btn" onclick="go('home')">Back</button>
</div>
</div>

<!-- GIFT -->
<div id="gift" class="page">
<div class="card">
<h2>Birthday Gift Choices 🎁</h2>

<div class="img-box">
<img src="gift1.jpg">
<p>Gift Name</p>
<button class="btn" onclick="alert('Please tell FIFI ASAP 💖')">I want this</button>
</div>

<h3>Privileges 🎟️</h3>

<div class="ticket" onclick="alert('TELL FIFI NOW 😏')">🎬 Movie Night</div>
<div class="ticket" onclick="alert('TELL FIFI NOW 😏')">🎮 Game Marathon</div>

<button class="btn" onclick="go('home')">Back</button>
</div>
</div>

<!-- SECRET -->
<div id="secret" class="page">
<div class="card">
<h2>Secret Message 💌</h2>

<div class="letter">
Happy Birthday sayang 💖<br><br>
I love you always ❤️
</div>

<button class="btn" onclick="go('home')">Back</button>
</div>
</div>

<script>
function checkPassword(){
let pass = document.getElementById("password").value;
if(pass==="1234"){
alert("Welcome 💖");
document.getElementById("login").style.display="none";
document.getElementById("home").style.display="block";
}else{
alert("Wrong password 😭");
}
}

function go(page){
document.querySelectorAll('.page').forEach(p=>p.style.display="none");
document.getElementById(page).style.display="block";
}
</script>

</body>
</html>
